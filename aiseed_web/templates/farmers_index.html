{% extends "base.html" %}
{% block title %}農家 — {{ site_title }}{% endblock %}

{% block content %}
<section class="section">
  <div class="container">
    <h1>農家一覧</h1>
    <div class="grid grid-3">
      {% for farmer in farmers %}
      <a class="card" href="/farmers/{{ farmer.id }}.html">
        {% if farmer.image %}
        <img class="card-image" src="/assets/images/{{ farmer.image }}" alt="{{ farmer.name }}" loading="lazy">
        {% endif %}
        <div class="card-body">
          <h3>{{ farmer.name }}</h3>
          <p class="card-meta">{{ farmer.region }} / {{ farmer.policy }}</p>
        </div>
      </a>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
