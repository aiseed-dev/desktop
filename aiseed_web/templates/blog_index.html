{% extends "base.html" %}
{% block title %}お知らせ — {{ site_title }}{% endblock %}

{% block content %}
<section class="section">
  <div class="container container-narrow">
    <h1>お知らせ</h1>
    <div class="list">
      {% for post in posts %}
      <article class="list-item">
        <p class="meta">{{ post.get('date', '') }}</p>
        <h2>{{ post.get('title', post.slug) }}</h2>
        <div class="prose">{{ post.body_html | safe }}</div>
      </article>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
