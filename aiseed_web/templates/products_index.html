{% extends "base.html" %}
{% block title %}商品 — {{ site_title }}{% endblock %}

{% block content %}
<section class="section">
  <div class="container">
    <h1>商品一覧</h1>
    <div class="grid grid-3">
      {% for product in products %}
      <a class="card" href="/products/{{ product.id }}.html">
        {% if product.image %}
        <img class="card-image" src="/assets/images/{{ product.image }}" alt="{{ product.name }}" loading="lazy">
        {% endif %}
        <div class="card-body">
          <h3>{{ product.name }}</h3>
          <p class="card-meta">{{ product.category }}</p>
        </div>
      </a>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
